# Simple workflow for deploying static content to GitHub Pages
name: Deploy game to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot files
        id: cache-godot
        uses: actions/cache@v5
        with:
          path: |
            ./godot.exec
            ~/.local/share/godot/export_templates/4.6.3.stable/
          key: ${{ runner.os }}-godot-4.6.3-stable

      - name: Download Godot 4.6.3
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget --no-verbose https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          unzip Godot_v4.6.3-stable_linux.x86_64.zip
          mv Godot_v4.6.3-stable_linux.x86_64 godot.exec
          chmod +x godot.exec

      - name: Install Godot Templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget --no-verbose https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.6.3.stable
          unzip Godot_v4.6.3-stable_export_templates.tpz -d temp_templates
          mv temp_templates/templates/* ~/.local/share/godot/export_templates/4.6.3.stable/
          rm -rf temp_templates Godot_v4.6.3-stable_export_templates.tpz

      - name: Build project
        run: |
          mkdir -p out/release/HTML5
          ./godot.exec --export-release "Web" out/release/HTML5/index.html --headless --quit

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/release/HTML5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
